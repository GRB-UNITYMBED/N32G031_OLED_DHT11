# OpenOCD config for N32G031 via CMSIS-DAP (SWD)
# Custom flash driver — Nations N32 FPEC is register-identical to STM32F1/F0
# (FLASH controller at 0x40022000). We can't use openocd's stock stm32f1x
# driver because its probe reads DBGMCU_IDCODE at 0x40015800, an address the
# N32G031 doesn't implement -> "auto_probe failed". So we drive FPEC directly.
#
# Speed: instead of one USB round-trip per word (mww + BSY poll, ~22 s for
# 8 KB) we stream each erase-block as ONE batched MEM-AP write_memory call.
# The CMSIS-DAP block transfer at 1 MHz naturally spaces consecutive word
# writes well past the FPEC ~50 us program time, so the controller keeps up;
# we still poll BSY once per chunk and verify the whole image at the end.
# Result: ~1.6 s for the same 8 KB (~14x faster), with a hard verify.

source [find interface/cmsis-dap.cfg]
transport select swd
adapter speed 1000

set CHIPNAME n32g031
source [find target/swj-dp.tcl]

swj_newdap $CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0xf
dap create $CHIPNAME.dap -chain-position $CHIPNAME.cpu

target create $CHIPNAME.cpu cortex_m -dap $CHIPNAME.dap
$CHIPNAME.cpu configure -work-area-phys 0x20000000 -work-area-size 0x1000 -work-area-backup 0

reset_config none separate

# ─── N32G031 FPEC registers (STM32F1-compatible) ───
#   0x40022004 FLASH_KEYR   0x40022008 FLASH_OPTKEYR
#   0x4002200C FLASH_SR     (bit0 BSY)
#   0x40022010 FLASH_CR     (bit0 PG, bit2 MER, bit6 STRT, bit7 LOCK)

proc n32_wait_bsy {} {
    set timeout 100000
    while {$timeout > 0} {
        if {(([lindex [read_memory 0x4002200C 32 1] 0]) & 0x01) == 0} { return }
        incr timeout -1
    }
    error "FLASH BSY timeout"
}

proc n32_unlock {} {
    if {(([lindex [read_memory 0x40022010 32 1] 0]) & 0x80) == 0} { return }
    mww 0x40022004 0x45670123
    mww 0x40022004 0xCDEF89AB
}

proc n32_lock {} { mww 0x40022010 0x00000080 }

proc n32_mass_erase {} {
    n32_unlock
    mww 0x40022010 0x00000004
    mww 0x40022010 0x00000044
    n32_wait_bsy
    mww 0x40022010 0x00000000
    puts "N32: flash mass-erased"
}

# Fast block programmer: build the word list on the host (no USB), then push
# each 256-word chunk in a single write_memory with PG set.
proc n32_flash_bin_fast { filename base } {
    n32_unlock
    set f [open $filename rb]
    fconfigure $f -translation binary
    set data [read $f]
    close $f
    set len [string length $data]
    while {($len % 4) != 0} { append data "\xff"; incr len }
    set nwords [expr {$len / 4}]

    set words {}
    for {set i 0} {$i < $len} {incr i 4} {
        set b0 [scan [string index $data $i] %c]
        set b1 [scan [string index $data [expr {$i+1}]] %c]
        set b2 [scan [string index $data [expr {$i+2}]] %c]
        set b3 [scan [string index $data [expr {$i+3}]] %c]
        lappend words [expr {($b3<<24)|($b2<<16)|($b1<<8)|$b0}]
    }

    puts "N32: programming $len bytes @ [format 0x%08x $base] ($nwords words)"
    mww 0x40022010 0x00000001
    set chunk 256
    for {set off 0} {$off < $nwords} {incr off $chunk} {
        set end [expr {$off + $chunk}]
        if {$end > $nwords} { set end $nwords }
        write_memory [expr {$base + $off*4}] 32 [lrange $words $off [expr {$end-1}]]
        n32_wait_bsy
    }
    mww 0x40022010 0x00000000
    puts "N32: programmed $len bytes"
}

# UnityMbed entry point — flash command calls: n32_program build/<name>.bin
proc n32_program { binfile } {
    halt
    n32_mass_erase
    n32_flash_bin_fast $binfile 0x08000000
    n32_lock
    # Hard verify: a dropped word can never report success silently.
    if {[catch {verify_image $binfile 0x08000000} err]} {
        error "N32: VERIFY FAILED — $err"
    }
    puts "N32: verify OK"
    reset run
}
